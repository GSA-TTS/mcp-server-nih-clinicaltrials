# Dataset registry for Phoenix evaluation experiments
# Each dataset maps to a CSV file with test questions and expected responses

datasets:
  clinicaltrials-test-0:
    csv_path: datasets/clinicaltrials-test-0/examples/clinicaltrials-test-0.csv
    input_keys:
      - query
    output_keys:
      - responses
    description: "Small dataset for testing the evaluation pipeline."

  clinicaltrials-eval-0:
    csv_path: datasets/clinicaltrials-eval-0/examples/clinicaltrials-eval-0.csv
    input_keys:
      - query
    output_keys:
      - responses
    description: "Dataset from NCBI for evaluation."


